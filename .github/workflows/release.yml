name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: model-meter-x86_64-unknown-linux-gnu
            archive_name: model-meter-x86_64-unknown-linux-gnu.tar.gz
            binary_name: model-meter
          - os: windows-latest
            artifact_name: model-meter-x86_64-pc-windows-msvc
            archive_name: model-meter-x86_64-pc-windows-msvc.zip
            binary_name: model-meter.exe
          - os: macos-13
            artifact_name: model-meter-x86_64-apple-darwin
            archive_name: model-meter-x86_64-apple-darwin.tar.gz
            binary_name: model-meter
          - os: macos-14
            artifact_name: model-meter-aarch64-apple-darwin
            archive_name: model-meter-aarch64-apple-darwin.tar.gz
            binary_name: model-meter

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir "${{ matrix.artifact_name }}"
          cp "target/release/${{ matrix.binary_name }}" "${{ matrix.artifact_name }}/model-meter"
          cp README.md LICENSE "${{ matrix.artifact_name }}/"
          tar -czf "${{ matrix.archive_name }}" "${{ matrix.artifact_name }}"

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "${{ matrix.artifact_name }}" | Out-Null
          Copy-Item "target/release/${{ matrix.binary_name }}" "${{ matrix.artifact_name }}/model-meter.exe"
          Copy-Item README.md, LICENSE "${{ matrix.artifact_name }}/"
          Compress-Archive -Path "${{ matrix.artifact_name }}" -DestinationPath "${{ matrix.archive_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive_name }}

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate checksums
        run: |
          cd dist
          find . -type f \( -name "*.tar.gz" -o -name "*.zip" \) -print0 | sort -z | xargs -0 sha256sum > checksums.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
            dist/checksums.txt
