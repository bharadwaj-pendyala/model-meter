name: Feature request
description: Suggest a new capability or improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement.
  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: Add a simpler install command for release binaries
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is hard or missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should the tool do instead?
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Extra notes
      description: Include any provider/API constraints if relevant
