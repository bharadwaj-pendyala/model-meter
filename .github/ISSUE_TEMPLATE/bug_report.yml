name: Bug report
description: Report a problem using model-meter
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please include enough detail to reproduce it.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: Short description of the problem
      placeholder: model-meter codex fails after a valid Codex login
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS 15, Ubuntu 24.04, Windows 11
    validations:
      required: true
  - type: input
    id: install
    attributes:
      label: Install method
      placeholder: GitHub release binary, cargo install --path ., cargo run
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command run
      placeholder: model-meter codex
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Output or error
      render: shell
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that would help reproduce or understand the issue
